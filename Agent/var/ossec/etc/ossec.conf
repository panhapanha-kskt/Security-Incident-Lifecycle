<!--
  Wazuh - Agent - Default configuration for kali 2026.1
  More info at: https://documentation.wazuh.com
  Mailing list: https://groups.google.com/forum/#!forum/wazuh

  CHANGES FROM ORIGINAL:
  - Merged two separate <syscheck> blocks into one (Downloads + Videos)
  - Removed duplicate apache2/access.log syslog-format entry
  - Synced firewall-drop AR rule IDs with manager (added 5710, 100904)
  - Removed duplicate/conflicting apache2 localfile declarations
  - Cleaned up second <ossec_config> block — merged all localfile entries
    into single config block
-->

<ossec_config>

  <!-- ============================================================
       Client
       ============================================================ -->
  <client>
    <server>
      <address>192.168.200.129</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>kali, kali2026, kali2026.1</config-profile>
    <notify_time>20</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
    <enrollment>
      <enabled>yes</enabled>
      <agent_name>Agent-Kali</agent_name>
      <groups>default</groups>
      <authorization_pass_path>etc/authd.pass</authorization_pass_path>
    </enrollment>
  </client>
  <labels>
    <label key="team">BlueTeam-Group7</label>
    <label key="env">SOC-Lab</label>
    <label key="platform">Kali-Agent</label>
    <label key="agent.role">attack-target</label>
    <label key="agent.os">Kali-Linux-2026.1</label>
    <label key="agent.owner">CBSA-Group7</label>
    <label key="monitoring.fim">enabled</label>
    <label key="monitoring.whodata">enabled</label>
    <label key="monitoring.ids">suricata+zeek</label>
    <label key="monitoring.edr">tetragon</label>
  </labels>



  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <!-- ============================================================
       Policy monitoring
       ============================================================ -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <!-- Frequency that rootcheck is executed - every 12 hours -->
    <frequency>43200</frequency>
    <rootkit_files>etc/shared/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>etc/shared/rootkit_trojans.txt</rootkit_trojans>
    <skip_nfs>yes</skip_nfs>
    <ignore>/var/lib/containerd</ignore>
    <ignore>/var/lib/docker/overlay2</ignore>
  </rootcheck>

  <wodle name="cis-cat">
    <disabled>yes</disabled>
    <timeout>1800</timeout>
    <interval>1d</interval>
    <scan-on-start>yes</scan-on-start>
    <java_path>wodles/java</java_path>
    <ciscat_path>wodles/ciscat</ciscat_path>
  </wodle>

  <!-- Osquery integration -->
  <wodle name="osquery">
    <disabled>yes</disabled>
    <run_daemon>yes</run_daemon>
    <log_path>/var/log/osquery/osqueryd.results.log</log_path>
    <config_path>/etc/osquery/osquery.conf</config_path>
    <add_labels>yes</add_labels>
  </wodle>

  <!-- ============================================================
       System inventory
       ============================================================ -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="yes">yes</ports>
    <processes>yes</processes>
    <users>yes</users>
    <groups>yes</groups>
    <services>yes</services>
    <browser_extensions>yes</browser_extensions>
    <!-- Database synchronization settings -->
    <synchronization>
      <max_eps>10</max_eps>
    </synchronization>
  </wodle>

  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <skip_nfs>yes</skip_nfs>
  </sca>

  <!-- ============================================================
       File integrity monitoring
       FIXED: Merged original two syscheck blocks into one.
         - /home/kali/Downloads: check_all + whodata (requires auditd running)
         - /home/kali/Videos:    check_all + realtime
       ============================================================ -->
  <syscheck>
    <disabled>no</disabled>
    <!-- Frequency that syscheck is executed - default every 12 hours -->
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>

    <!-- Standard system directories -->
    <directories>/etc,/usr/bin,/usr/sbin</directories>
    <directories>/bin,/sbin,/boot</directories>
    <!-- User directories with enhanced monitoring -->
    <!-- whodata requires auditd to be active; falls back to realtime if not -->
    <directories realtime="yes" check_all="yes" whodata="yes">/home/kali/Downloads</directories>
    <directories whodata="yes" check_all="yes" realtime="yes">/home/kali/Videos</directories>

    <!-- ── Miner + reverse shell drop zones (rules 100101, 100119, 100204, 100668) ── -->
    <directories realtime="yes" check_all="yes">/tmp</directories>
    <directories realtime="yes" check_all="yes">/dev/shm</directories>
    <directories realtime="yes" check_all="yes">/var/tmp</directories>

    <!-- ── Privileged binary paths — reverse shell tools (rules 100101, 100204) ── -->
    <directories realtime="yes" check_all="yes">/usr/local/bin</directories>
    <directories realtime="yes" check_all="yes">/usr/local/sbin</directories>

    <!-- ── Cron jobs — persistence mechanism (TA0003) ── -->
    <directories realtime="yes" check_all="yes">/etc/cron.d</directories>
    <directories realtime="yes" check_all="yes">/etc/cron.daily</directories>
    <directories realtime="yes" check_all="yes">/var/spool/cron/crontabs</directories>

    <!-- ── Startup/init persistence (TA0003) ── -->
    <directories realtime="yes" check_all="yes">/etc/init.d</directories>
    <directories realtime="yes" check_all="yes">/etc/systemd/system</directories>

    <!-- ── Critical files — rules 100117, 100123 (T1222, T1098, T1136) ── -->
    <directories realtime="yes" check_all="yes" whodata="yes">/etc/passwd</directories>
    <directories realtime="yes" check_all="yes" whodata="yes">/etc/shadow</directories>
    <directories realtime="yes" check_all="yes" whodata="yes">/etc/sudoers</directories>
    <directories realtime="yes" check_all="yes" whodata="yes">/etc/sudoers.d</directories>




    <!-- Files/directories to ignore -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/random.seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/httpd/logs</ignore>
    <ignore>/etc/utmpx</ignore>
    <ignore>/etc/wtmpx</ignore>
    <ignore>/etc/cups/certs</ignore>
    <ignore>/etc/dumpdates</ignore>
    <ignore>/etc/svc/volatile</ignore>

    <!-- Ignore noisy runtime paths to reduce false positives -->
    <ignore>/tmp/.ICE-unix</ignore>
    <ignore>/tmp/.X11-unix</ignore>
    <ignore type="sregex">^/proc</ignore>
    <ignore type="sregex">^/sys/fs</ignore>


    <!-- File types to ignore -->
    <ignore type="sregex">.log$|.swp$</ignore>

    <!-- Check the file, but never compute the diff -->
    <nodiff>/etc/ssl/private.key</nodiff>
    <!-- Never compute diff on sensitive credential files -->
    <nodiff>/etc/shadow</nodiff>
    <nodiff>/etc/sudoers</nodiff>
    <nodiff>/etc/gshadow</nodiff>

    <skip_nfs>yes</skip_nfs>
    <skip_dev>yes</skip_dev>
    <skip_proc>yes</skip_proc>
    <skip_sys>yes</skip_sys>

    <!-- Nice value for Syscheck process -->
    <process_priority>10</process_priority>

    <!-- Maximum output throughput -->
    <max_eps>50</max_eps>

    <!-- Database synchronization settings -->
    <synchronization>
      <enabled>yes</enabled>
      <interval>5m</interval>
      <max_eps>10</max_eps>
    </synchronization>
  </syscheck>

  <!-- ============================================================
       Log analysis
       FIXED: Removed duplicate apache2/access.log syslog-format entry.
         Keep only the apache-format declarations. Added all formerly
         split-out localfile entries here in one place.
       ============================================================ -->
  <localfile>
    <log_format>command</log_format>
    <command>df -P</command>
    <frequency>360</frequency>
  </localfile>

  <!-- Zeek logs -->
  <localfile>
    <log_format>json</log_format>
    <location>/opt/zeek/logs/current/*.log</location>
  </localfile>

  <!-- Tetragon eBPF runtime security -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/tetragon/tetragon.log</location>
    <out_format>$(timestamp) $(hostname) tetragon-events: $(log)</out_format>
  </localfile>

  <!-- Suricata IDS/IPS -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/suricata/eve.json</location>
  </localfile>

  <localfile>
    <log_format>full_command</log_format>
    <command>netstat -tulpn | sed 's/\([[:alnum:]]\+\)\ \+[[:digit:]]\+\ \+[[:digit:]]\+\ \+\(.*\):\([[:digit:]]*\)\ \+\([0-9\.\:\*]\+\).\+\ \([[:digit:]]*\/[[:alnum:]\-]*\).*/\1 \2 == \3 == \4 \5/' | sort -k 4 -g | sed 's/ == \(.*\) ==/:\1/' | sed 1,2d</command>
    <alias>netstat listening ports</alias>
    <frequency>360</frequency>
  </localfile>

  <localfile>
    <log_format>full_command</log_format>
    <command>last -n 20</command>
    <frequency>360</frequency>
  </localfile>

  <localfile>
    <log_format>journald</log_format>
    <location>journald</location>
  </localfile>

  <!-- Nginx logs -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/nginx/access.log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/nginx/error.log</location>
  </localfile>

  <!-- Apache2 logs — apache format only, no duplicate syslog entry -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/access.log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/error.log</location>
  </localfile>
  <!-- General syslog -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>
  <!-- dpkg package install/remove history -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/dpkg.log</location>
  </localfile>
  <!-- Auth log — SSH and PAM events for brute-force detection -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>
  <!-- Auditd — required for whodata FIM on /home/kali/Downloads and /home/kali/Videos -->
  <localfile>
    <log_format>audit</log_format>
    <location>/var/log/audit/audit.log</location>
  </localfile>

  <!-- Active response log (required for AR feedback loop) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/ossec/logs/active-responses.log</location>
  </localfile>

  <command>
    <name>fim-respond.sh</name>
    <executable>fim-respond.sh</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>
  <command>
    <name>custom-block-ip</name>
    <executable>custom-block-ip.sh</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>
  <!-- ============================================================
       Active response
       FIXED: Added 5710 (SSH brute force) and 100904 (port scan)
         to match manager firewall-drop rule IDs exactly.
       ============================================================ -->
  <active-response>
    <disabled>no</disabled>
    <ca_store>etc/wpk_root.pem</ca_store>
    <ca_verification>yes</ca_verification>
  </active-response>

  <active-response>
    <disabled>no</disabled>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>651,5503,5710,5712,5715,5716,5758,5763,100101,100105,100106,100119,100200,100204,100625,100628,100650,100651,100652,100653,100654,100655,100656,100657,100662,100663,100664,100665,100666,100667,100668,100700,100805,100806,100808,100901,100904,100907</rules_id>
    <timeout>180</timeout>
  </active-response>

  <active-response>
    <disabled>no</disabled>
    <command>fim-respond.sh</command>
    <location>local</location>
    <rules_id>100117,100123,550,553,554</rules_id>
    <timeout>0</timeout>
  </active-response>

  <!-- Choose between "plain", "json", or "plain,json" for the format of internal logs -->
  <logging>
    <log_format>plain</log_format>
  </logging>

</ossec_config>
